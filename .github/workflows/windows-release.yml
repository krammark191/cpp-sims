name: Windows Release Build

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Configure Git line endings
        shell: pwsh
        run: git config --global core.autocrlf input

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            zip
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-freeglut
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ninja

      - name: Configure CMake
        run: >
          cmake -S . -B build/windows-release -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=OFF

      - name: Build Windows executable
        run: cmake --build build/windows-release

      - name: Package Windows release files
        run: |
          rm -rf dist/windows-package
          mkdir -p "dist/windows-package"

          cp "build/windows-release/cpp_simulators_window.exe" "dist/windows-package/C++ Simulators.exe"
          cp -r assets "dist/windows-package/"

          for dll in libfreeglut.dll libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll
          do
            if [[ -f "/ucrt64/bin/$dll" ]]; then
              cp "/ucrt64/bin/$dll" "dist/windows-package/"
            fi
          done

          cp "dist/windows-package/C++ Simulators.exe" "dist/C++ Simulators.exe"
          (
            cd "dist/windows-package"
            zip -r "../C++ Simulators-windows.zip" .
          )

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpp-simulators-windows
          path: |
            dist/C++ Simulators.exe
            dist/C++ Simulators-windows.zip

      - name: Attach Windows assets to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/C++ Simulators.exe
            dist/C++ Simulators-windows.zip
